name: CI

# Fast quality gate: lint, test, typecheck, and build the web/PWA on every
# push and PR. The slow multi-OS desktop builds live in release.yml (tag-
# triggered) so this stays quick.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Lint · Test · Build (web/PWA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # `build` runs `tsc -b && vite build`, so this also typechecks.
      - name: Build (web + PWA)
        run: npm run build

      - name: Upload PWA build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error
